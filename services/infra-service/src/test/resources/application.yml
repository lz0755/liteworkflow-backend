spring:
  datasource:
    url: jdbc:h2:mem:infra;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS infra
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        default_schema: infra
  rabbitmq:
    listener:
      simple:
        auto-startup: false
  mail:
    host: localhost
    port: 1025

management:
  health:
    rabbit:
      enabled: false

liteworkflow:
  security:
    jwt:
      secret: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  storage:
    scheduling-enabled: false
    s3:
      access-key: test-access-key
      secret-key: test-secret-key
  notification:
    core-service-url: http://localhost:8082
    internal-token: internal-test-token
    web-base-url: http://localhost:3000
    email:
      max-attempts: 2
      retry-delay: 1ms
      scheduling-enabled: false
  export:
    scheduling-enabled: false
