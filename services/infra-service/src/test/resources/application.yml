spring:
  datasource:
    url: jdbc:h2:mem:infra;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS infra
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        default_schema: infra
  rabbitmq:
    listener:
      simple:
        auto-startup: false

management:
  health:
    rabbit:
      enabled: false
