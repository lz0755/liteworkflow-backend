server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: infra-service
  main:
    banner-mode: off
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:liteworkflow_backend}
    username: ${POSTGRES_USER:liteworkflow}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: infra
  flyway:
    enabled: true
    schemas: infra
    default-schema: infra
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 500ms
          multiplier: 2
          max-interval: 5s
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    properties:
      mail.smtp.connectiontimeout: ${SMTP_CONNECTION_TIMEOUT_MS:5000}
      mail.smtp.timeout: ${SMTP_READ_TIMEOUT_MS:5000}
      mail.smtp.writetimeout: ${SMTP_WRITE_TIMEOUT_MS:5000}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 51MB

liteworkflow:
  security:
    jwt:
      secret: ${JWT_SECRET:}
      issuer: ${JWT_ISSUER:liteworkflow}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      clock-skew: ${JWT_CLOCK_SKEW:30s}
  storage:
    core-service-url: ${CORE_SERVICE_URL:http://localhost:8082}
    internal-token: ${INTERNAL_SERVICE_TOKEN:change-me-internal-token}
    scheduling-enabled: ${FILE_SCHEDULING_ENABLED:true}
    s3:
      bucket: ${S3_BUCKET:${SEAWEEDFS_BUCKET:liteworkflow}}
      region: ${S3_REGION:us-east-1}
      endpoint: ${S3_ENDPOINT:http://localhost:8333}
      access-key: ${S3_ACCESS_KEY:${SEAWEEDFS_ACCESS_KEY:}}
      secret-key: ${S3_SECRET_KEY:${SEAWEEDFS_SECRET_KEY:}}
      path-style: ${S3_PATH_STYLE:true}
    limits:
      avatar-bytes: ${FILE_AVATAR_MAX_BYTES:5242880}
      icon-bytes: ${FILE_ICON_MAX_BYTES:5242880}
      attachment-bytes: ${FILE_ATTACHMENT_MAX_BYTES:26214400}
      document-bytes: ${FILE_DOCUMENT_MAX_BYTES:52428800}
  notification:
    core-service-url: ${CORE_SERVICE_URL:http://localhost:8082}
    internal-token: ${INTERNAL_SERVICE_TOKEN:change-me-internal-token}
    web-base-url: ${LITEWORKFLOW_WEB_BASE_URL:http://localhost:3000}
    email:
      from: ${SMTP_FROM:no-reply@liteworkflow.local}
      max-attempts: ${EMAIL_MAX_ATTEMPTS:5}
      retry-delay: ${EMAIL_RETRY_DELAY:10s}
      batch-size: ${EMAIL_BATCH_SIZE:25}
      dispatch-delay: ${EMAIL_DISPATCH_DELAY:5s}
      scheduling-enabled: ${EMAIL_SCHEDULING_ENABLED:true}
  export:
    scheduling-enabled: ${EXPORT_SCHEDULING_ENABLED:true}
    max-publish-attempts: ${EXPORT_MAX_PUBLISH_ATTEMPTS:12}
    retry-delay: ${EXPORT_PUBLISH_RETRY_DELAY:10s}
    publisher-confirm-timeout: ${EXPORT_PUBLISHER_CONFIRM_TIMEOUT:5s}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"

springdoc:
  api-docs:
    enabled: ${LITEWORKFLOW_OPENAPI_ENABLED:true}
