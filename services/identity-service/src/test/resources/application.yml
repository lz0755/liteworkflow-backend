spring:
  datasource:
    url: jdbc:h2:mem:identity;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS identity
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        default_schema: identity
  task:
    scheduling:
      enabled: false
  mail:
    host: localhost
    port: 1025
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
  data:
    redis:
      repositories:
        enabled: false

liteworkflow:
  security:
    jwt:
      secret: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      issuer: liteworkflow-test
  identity:
    outbox:
      immediate-publish: false
      scheduling-enabled: false
      retry-delay: 1ms

management:
  health:
    rabbit:
      enabled: false
    redis:
      enabled: false
    mail:
      enabled: false

logging:
  level:
    org.hibernate.SQL: WARN
