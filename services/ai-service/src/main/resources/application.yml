server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: ai-service
  main:
    banner-mode: off
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:liteworkflow_backend}
    username: ${POSTGRES_USER:liteworkflow}
    password: ${POSTGRES_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        default-requeue-rejected: false
  flyway:
    enabled: true
    schemas: ai
    default-schema: ai
    locations: classpath:db/ai-migration,classpath:db/rag-migration
    placeholders:
      embeddingDimensions: ${LITEWORKFLOW_AI_EMBEDDING_DIMENSIONS:}
  ai:
    model:
      chat: openai
      embedding: openai
    openai:
      base-url: ${LITEWORKFLOW_AI_BASE_URL:}
      api-key: ${LITEWORKFLOW_AI_API_KEY:}
      chat:
        completions-path: ${LITEWORKFLOW_AI_CHAT_COMPLETIONS_PATH:/v1/chat/completions}
        options:
          model: ${LITEWORKFLOW_AI_CHAT_MODEL:}
          max-tokens: ${LITEWORKFLOW_AI_MAX_OUTPUT_TOKENS:2000}
      embedding:
        base-url: ${LITEWORKFLOW_AI_EMBEDDING_BASE_URL:${LITEWORKFLOW_AI_BASE_URL:}}
        api-key: ${LITEWORKFLOW_AI_EMBEDDING_API_KEY:${LITEWORKFLOW_AI_API_KEY:}}
        embeddings-path: ${LITEWORKFLOW_AI_EMBEDDINGS_PATH:/v1/embeddings}
        options:
          model: ${LITEWORKFLOW_AI_EMBEDDING_MODEL:}
          dimensions: ${LITEWORKFLOW_AI_EMBEDDING_DIMENSIONS:}
    vectorstore:
      type: pgvector
      pgvector:
        schema-name: rag
        table-name: vector_store
        initialize-schema: ${LITEWORKFLOW_RAG_INITIALIZE_SCHEMA:false}
        schema-validation: true
        distance-type: COSINE_DISTANCE
        index-type: NONE
        dimensions: ${LITEWORKFLOW_AI_EMBEDDING_DIMENSIONS:}
    retry:
      max-attempts: ${LITEWORKFLOW_AI_RETRY_MAX_ATTEMPTS:3}
      backoff:
        initial-interval: ${LITEWORKFLOW_AI_RETRY_INITIAL_INTERVAL:250ms}
        multiplier: ${LITEWORKFLOW_AI_RETRY_MULTIPLIER:2}
        max-interval: ${LITEWORKFLOW_AI_RETRY_MAX_INTERVAL:2s}
      on-client-errors: false
      on-http-codes: 429,500,502,503,504

liteworkflow:
  security:
    jwt:
      secret: ${JWT_SECRET:}
      issuer: ${JWT_ISSUER:liteworkflow}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      clock-skew: ${JWT_CLOCK_SKEW:30s}
  ai:
    provider: openai
    base-url: ${LITEWORKFLOW_AI_BASE_URL:}
    api-key: ${LITEWORKFLOW_AI_API_KEY:}
    chat-model: ${LITEWORKFLOW_AI_CHAT_MODEL:}
    core-service-url: ${CORE_SERVICE_URL:http://localhost:8082}
    internal-token: ${INTERNAL_SERVICE_TOKEN:}
    connect-timeout: ${LITEWORKFLOW_AI_CONNECT_TIMEOUT:10s}
    request-timeout: ${LITEWORKFLOW_AI_REQUEST_TIMEOUT:60s}
    max-output-tokens: ${LITEWORKFLOW_AI_MAX_OUTPUT_TOKENS:2000}
    max-concurrent-requests: ${LITEWORKFLOW_AI_MAX_CONCURRENT_REQUESTS:8}
    concurrency-acquire-timeout: ${LITEWORKFLOW_AI_CONCURRENCY_ACQUIRE_TIMEOUT:100ms}
    max-concurrent-streams: ${LITEWORKFLOW_AI_MAX_CONCURRENT_STREAMS:4}
    stream-concurrency-acquire-timeout: ${LITEWORKFLOW_AI_STREAM_CONCURRENCY_ACQUIRE_TIMEOUT:50ms}
    stream-idle-timeout: ${LITEWORKFLOW_AI_STREAM_IDLE_TIMEOUT:60s}
    daily-request-limit: ${LITEWORKFLOW_AI_DAILY_REQUEST_LIMIT:100}
    daily-token-limit: ${LITEWORKFLOW_AI_DAILY_TOKEN_LIMIT:200000}
    rag:
      enabled: ${LITEWORKFLOW_RAG_ENABLED:true}
      embedding-model: ${LITEWORKFLOW_AI_EMBEDDING_MODEL:}
      embedding-dimensions: ${LITEWORKFLOW_AI_EMBEDDING_DIMENSIONS:}
      startup-validation: ${LITEWORKFLOW_RAG_STARTUP_VALIDATION:true}
      top-k: ${LITEWORKFLOW_RAG_TOP_K:8}
      similarity-threshold: ${LITEWORKFLOW_RAG_SIMILARITY_THRESHOLD:0.72}
      document-chunk-tokens: ${LITEWORKFLOW_RAG_DOCUMENT_CHUNK_TOKENS:650}
      document-chunk-overlap-tokens: ${LITEWORKFLOW_RAG_DOCUMENT_CHUNK_OVERLAP_TOKENS:100}
      max-document-chunks: ${LITEWORKFLOW_RAG_MAX_DOCUMENT_CHUNKS:10000}
      max-extracted-characters: ${LITEWORKFLOW_RAG_MAX_EXTRACTED_CHARACTERS:5000000}
      max-document-bytes: ${FILE_DOCUMENT_MAX_BYTES:52428800}
      index-max-attempts: ${LITEWORKFLOW_RAG_INDEX_MAX_ATTEMPTS:3}
      index-retry-initial-interval: ${LITEWORKFLOW_RAG_INDEX_RETRY_INITIAL_INTERVAL:500ms}
      index-processing-lease: ${LITEWORKFLOW_RAG_INDEX_PROCESSING_LEASE:5m}
      s3:
        bucket: ${S3_BUCKET:${SEAWEEDFS_BUCKET:liteworkflow}}
        region: ${S3_REGION:us-east-1}
        endpoint: ${S3_ENDPOINT:http://localhost:8333}
        access-key: ${S3_ACCESS_KEY:${SEAWEEDFS_ACCESS_KEY:}}
        secret-key: ${S3_SECRET_KEY:${SEAWEEDFS_SECRET_KEY:}}
        path-style: ${S3_PATH_STYLE:true}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"
  level:
    # Spring AI's default retry listener includes the entire provider error body.
    # Application-level logs below emit only request metadata and stable error codes.
    org.springframework.ai.retry.autoconfigure.SpringAiRetryAutoConfiguration: ERROR
    # These packages include request/response DTO content at DEBUG; keep prompts out even
    # when an operator temporarily lowers the root level.
    org.springframework.web.client: INFO
    org.springframework.web.servlet.mvc.method.annotation: INFO
    org.springframework.web.servlet.mvc.method.annotation.ReactiveTypeHandler: INFO
    org.springframework.ai.openai: INFO
    # Spring AI's stream aggregator logs upstream exceptions (including response bodies) by default.
    org.springframework.ai.chat.model.MessageAggregator: OFF
    # Defense in depth: this converter logs malformed model output at WARN.
    # ai-service performs its own Jackson + Bean Validation conversion instead.
    org.springframework.ai.converter.BeanOutputConverter: OFF

springdoc:
  api-docs:
    enabled: ${LITEWORKFLOW_OPENAPI_ENABLED:true}
