server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: core-service
  main:
    banner-mode: off

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"

springdoc:
  api-docs:
    enabled: ${LITEWORKFLOW_OPENAPI_ENABLED:true}
