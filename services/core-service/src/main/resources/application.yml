server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: core-service
  main:
    banner-mode: off
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:liteworkflow_backend}
    username: ${POSTGRES_USER:liteworkflow}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: core
  flyway:
    enabled: true
    schemas: core
    default-schema: core
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 500ms
          multiplier: 2
          max-interval: 5s

liteworkflow:
  security:
    jwt:
      secret: ${JWT_SECRET:}
      issuer: ${JWT_ISSUER:liteworkflow}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      clock-skew: ${JWT_CLOCK_SKEW:30s}
  core:
    permission-cache-enabled: ${CORE_PERMISSION_CACHE_ENABLED:true}
    outbox:
      max-retries: ${CORE_OUTBOX_MAX_RETRIES:12}
      retry-delay: ${CORE_OUTBOX_RETRY_DELAY:10s}
      publisher-confirm-timeout: ${CORE_OUTBOX_PUBLISHER_CONFIRM_TIMEOUT:5s}
      immediate-publish: ${CORE_OUTBOX_IMMEDIATE_PUBLISH:true}
      scheduling-enabled: ${CORE_OUTBOX_SCHEDULING_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"

springdoc:
  api-docs:
    enabled: ${LITEWORKFLOW_OPENAPI_ENABLED:true}
