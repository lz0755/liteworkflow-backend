name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Require Docker for Testcontainers
        run: docker info

      - name: Run full test suite
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Require M13 Testcontainers to execute
        shell: bash
        run: |
          reports=(
            services/core-service/target/surefire-reports/TEST-com.liteworkflow.core.InfrastructureTestcontainersTest.xml
            services/ai-service/target/surefire-reports/TEST-com.liteworkflow.ai.PostgresQuotaConcurrencyTest.xml
            services/ai-service/target/surefire-reports/TEST-com.liteworkflow.ai.rag.PgVectorRagIntegrationTest.xml
          )
          for report in "${reports[@]}"; do
            test -f "$report"
            grep -q 'skipped="0"' "$report"
          done
