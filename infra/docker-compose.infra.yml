name: liteworkflow-infra

x-service-security: &service-security
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped
  networks:
    - liteworkflow-infra

services:
  postgres:
    <<: *service-security
    image: pgvector/pgvector:${PGVECTOR_IMAGE_TAG:?Set PGVECTOR_IMAGE_TAG in .env}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
      POSTGRES_APP_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_APP_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - 127.0.0.1:${POSTGRES_PORT:-5432}:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          PGPASSWORD="$${POSTGRES_APP_PASSWORD}"
          psql -h 127.0.0.1 -U "$${POSTGRES_APP_USER}" -d "$${POSTGRES_DB}"
          -v ON_ERROR_STOP=1 -Atqc
          "SELECT 1 FROM pg_extension WHERE extname = 'vector'" | grep -qx 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    <<: *service-security
    image: redis:${REDIS_IMAGE_TAG:?Set REDIS_IMAGE_TAG in .env}
    user: redis
    cap_drop:
      - ALL
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command:
      - /bin/sh
      - -ec
      - exec redis-server --appendonly yes --appendfsync everysec --requirepass "$${REDIS_PASSWORD}"
    ports:
      - 127.0.0.1:${REDIS_PORT:-6379}:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli --no-auth-warning -a "$${REDIS_PASSWORD}" ping | grep -qx PONG
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  rabbitmq:
    <<: *service-security
    image: rabbitmq:${RABBITMQ_IMAGE_TAG:?Set RABBITMQ_IMAGE_TAG in .env}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:?Set RABBITMQ_VHOST in .env}
    ports:
      - 127.0.0.1:${RABBITMQ_AMQP_PORT:-5672}:5672
      - 127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/20-liteworkflow.conf:/etc/rabbitmq/conf.d/20-liteworkflow.conf:ro
    healthcheck:
      test: [CMD, rabbitmq-diagnostics, -q, ping]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 30s

  nacos:
    <<: *service-security
    image: nacos/nacos-server:${NACOS_IMAGE_TAG:?Set NACOS_IMAGE_TAG in .env}
    cap_drop:
      - ALL
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_USER_AGENT_AUTH_WHITE_ENABLE: "false"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:?Set NACOS_AUTH_TOKEN in .env}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?Set NACOS_AUTH_IDENTITY_KEY in .env}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?Set NACOS_AUTH_IDENTITY_VALUE in .env}
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - 127.0.0.1:${NACOS_CONSOLE_PORT:-8888}:8080
      - 127.0.0.1:${NACOS_CLIENT_PORT:-8848}:8848
      - 127.0.0.1:${NACOS_GRPC_PORT:-9848}:9848
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: [CMD-SHELL, "curl --fail --silent --location http://127.0.0.1:8080/ >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 24
      start_period: 60s

  seaweedfs:
    <<: *service-security
    image: chrislusf/seaweedfs:${SEAWEEDFS_IMAGE_TAG:?Set SEAWEEDFS_IMAGE_TAG in .env}
    environment:
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_ACCESS_KEY:?Set SEAWEEDFS_ACCESS_KEY in .env}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_SECRET_KEY:?Set SEAWEEDFS_SECRET_KEY in .env}
      S3_BUCKET: ${SEAWEEDFS_BUCKET:-liteworkflow}
    command: mini -dir=/data
    ports:
      - 127.0.0.1:${SEAWEEDFS_S3_PORT:-8333}:8333
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: [CMD-SHELL, "wget --quiet --spider http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  mailhog:
    <<: *service-security
    image: mailhog/mailhog:${MAILHOG_IMAGE_TAG:?Set MAILHOG_IMAGE_TAG in .env}
    user: root
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    entrypoint: [/bin/sh, /opt/liteworkflow/entrypoint.sh]
    environment:
      MH_STORAGE: maildir
      MH_MAILDIR_PATH: /maildir
    ports:
      - 127.0.0.1:${MAILHOG_SMTP_PORT:-1025}:1025
      - 127.0.0.1:${MAILHOG_UI_PORT:-8025}:8025
    volumes:
      - mailhog-data:/maildir
      - ./mailhog/entrypoint.sh:/opt/liteworkflow/entrypoint.sh:ro
    healthcheck:
      test: [CMD-SHELL, "wget --quiet --spider http://127.0.0.1:8025/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  nacos-data:
  seaweedfs-data:
  mailhog-data:

networks:
  liteworkflow-infra:
    name: liteworkflow-infra-network
    driver: bridge
